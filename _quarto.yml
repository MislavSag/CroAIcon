project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - about.qmd
    - podaci.qmd
    - 404.qmd
    - posts/**/*.qmd
  preview:
    port: 4200
    browser: false

lang: hr

# Quarto bundles no Croatian locale, so override the visible UI strings.
language:
  toc-title-website: "Na ovoj stranici"
  toc-title-document: "Sadržaj"
  title-block-author-single: "Autor"
  title-block-author-plural: "Autori"
  title-block-published: "Objavljeno"
  title-block-modified: "Promijenjeno"
  repo-action-links-edit: "Uredi stranicu"
  repo-action-links-source: "Izvor"
  repo-action-links-issue: "Prijavi problem"
  back-to-top: "Na vrh"
  toggle-navigation: "Izbornik"
  search-label: "Pretraži"
  search-text-placeholder: "Pretraži"
  search-no-results-text: "Nema rezultata"
  search-matching-documents-text: "podudarni dokumenti"
  search-clear-button-title: "Očisti"
  search-detached-cancel-button-title: "Odustani"
  search-submit-button-title: "Pretraži"
  copy-button-tooltip: "Kopiraj"
  copy-button-tooltip-success: "Kopirano!"
  callout-note-title: "Napomena"
  callout-tip-title: "Savjet"
  callout-warning-title: "Upozorenje"
  callout-important-title: "Važno"
  callout-caution-title: "Oprez"
  section-title-footnotes: "Bilješke"
  section-title-references: "Literatura"
  listing-page-field-categories: "Kategorije"
  listing-page-category-all: "Sve"
  listing-page-order-by-default: "Zadano"
  listing-page-order-by-date-asc: "Najstarije"
  listing-page-order-by-date-desc: "Najnovije"
  listing-page-no-matches: "Nema rezultata"
  draft: "Nacrt"

execute:
  freeze: auto
  warning: false
  message: false

website:
  title: "AI.econ"
  description: "ekonomski blog"
  site-url: "https://MislavSag.github.io/CroAIcon"
  repo-url: "https://github.com/MislavSag/CroAIcon"
  repo-actions: [source, issue]
  open-graph: true
  twitter-card: true
  search:
    location: navbar
    type: overlay
  navbar:
    background: light
    title: "AI.econ"
    right:
      - text: "Analize"
        href: index.qmd
      - text: "O projektu"
        href: about.qmd
      - text: "Podaci"
        href: podaci.qmd
      - text: "RSS"
        href: index.xml
      - icon: github
        href: "https://github.com/MislavSag/CroAIcon"
        aria-label: "GitHub"
  page-footer:
    left: "AI.econ"
    center: "© 2026 AI.econ · CC BY 4.0"
    right:
      - text: "RSS"
        href: index.xml
      - icon: github
        href: "https://github.com/MislavSag/CroAIcon"
        aria-label: "GitHub"
  comments:
    giscus:
      repo: MislavSag/CroAIcon
      repo-id: R_kgDOS_PHDw
      category: Announcements
      category-id: DIC_kwDOS_PHD84C_eJi
      mapping: pathname
      reactions-enabled: true
      input-position: bottom
      theme: light
      language: hr
      loading: lazy

format:
  html:
    theme:
      - cosmo
      - assets/styles/styles.scss
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;700&family=Source+Sans+3:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    toc: true
    toc-location: right
    toc-depth: 3
    code-fold: false
    code-tools: false
    code-copy: true
    date-format: "YYYY.MM.DD"
    smooth-scroll: true
    anchor-sections: true
    link-external-newwindow: true
    link-external-icon: false
    fig-align: center
    df-print: kable
